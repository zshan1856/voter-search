<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #fafafa;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .search-btn { background: black; color: white; }

    .filter-btn { background: #1976d2; color: white; }

    .clear-btn { background: #e53935; color: white; }

    .result {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .highlight-name { background: yellow; }
    .highlight-filter { background: #80deea; }

    .filter-box {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: white;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .active-filter {
      margin-top: 5px;
      color: green;
    }
  </style>
</head>

<body>

<h2>Kausa Mumbra 2002 Voter Search</h2>

<input id="surname" placeholder="Surname">
<input id="firstname" placeholder="First Name">

<button class="search-btn" onclick="search()">Search</button>

<p id="status"></p>

<button id="filterBtn" class="filter-btn" style="display:none;" onclick="toggleFilter()">Filters</button>

<div id="filterBox" class="filter-box">
  <input id="houseFilter" placeholder="House No">
  <input id="ageFilter" placeholder="Age">

  <button onclick="applyFilter()">Apply Filter</button>
  <button class="clear-btn" onclick="clearFilter()">Clear Filter</button>

  <div id="activeFilters" class="active-filter"></div>
</div>

<div id="results"></div>

<script>
let originalResults = [];

function highlight(text, query) {
    if (!query) return text;
    let regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, '<span class="highlight-name">$1</span>');
}

async function search() {

    // reset filter UI
    document.getElementById("filterBox").style.display = "none";
    document.getElementById("activeFilters").innerText = "";

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    let res = await fetch(`/search?surname=${encodeURIComponent(surname)}&firstname=${encodeURIComponent(firstname)}`);
    let data = await res.json();

    originalResults = data.results;

    document.getElementById("filterBtn").style.display = "block";

    render(originalResults);
}

function render(data) {

    let resultsDiv = document.getElementById("results");
    let status = document.getElementById("status");

    status.innerText = `Found ${data.length} results`;

    resultsDiv.innerHTML = "";

    data.forEach(r => {

        let name = r.name;

        name = highlight(name, document.getElementById("surname").value);
        name = highlight(name, document.getElementById("firstname").value);

        let div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <b>${name}</b><br>
            Relative: ${r.relative_name || "N/A"}<br>
            House: ${r.house_no} | Age: ${r.age}
        `;

        resultsDiv.appendChild(div);
    });
}

function toggleFilter() {
    let box = document.getElementById("filterBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function applyFilter() {

    let house = document.getElementById("houseFilter").value;
    let age = document.getElementById("ageFilter").value;

    let filtered = originalResults;

    if (house) {
        filtered = filtered.filter(r => r.house_no === house);
    }

    if (age) {
        filtered = filtered.filter(r => String(r.age) === age);
    }

    document.getElementById("activeFilters").innerText =
        `Filters: ${house ? "House=" + house : ""} ${age ? " Age=" + age : ""}`;

    render(filtered);
}

function clearFilter() {
    document.getElementById("houseFilter").value = "";
    document.getElementById("ageFilter").value = "";
    document.getElementById("activeFilters").innerText = "";
    render(originalResults);
}
</script>

</body>
</html>
