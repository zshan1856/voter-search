<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>

  <style>
    body { font-family: Arial; max-width: 700px; margin: auto; padding: 20px; }

    input { width: 100%; padding: 10px; margin: 5px 0; }

    button { padding: 10px; margin-top: 5px; cursor: pointer; }

    .search-btn { background: black; color: white; }
    .cancel-btn { background: red; color: white; }
    .filter-btn { background: #1976d2; color: white; }

    .result { border-bottom: 1px solid #ccc; padding: 10px 0; }

    .highlight { background: yellow; }

    #loader { display:none; }
  </style>
</head>

<body>

<h2>Kausa Mumbra 2002 Voter Search</h2>

<a href="https://drive.google.com/uc?export=download&id=1qwCIJ4ERVkUSm_k0-4hk-92eHRWSV5Tg" target="_blank">
  <button>Download Full Voter List (PDF)</button>
</a>

<input id="surname" placeholder="Surname">
<input id="firstname" placeholder="First Name">

<button class="search-btn" id="searchBtn" onclick="search()">Search</button>
<button class="cancel-btn" onclick="cancelSearch()">Cancel</button>

<p id="status"></p>
<p id="loader">🔍 Searching...</p>

<div id="results"></div>

<script>
let controller;

function highlight(text, q) {
    if (!q) return text;
    return text.replace(new RegExp(q, "gi"), m => `<span class="highlight">${m}</span>`);
}

async function search() {

    let surname = document.getElementById("surname").value;
    let firstname = document.getElementById("firstname").value;

    document.getElementById("searchBtn").disabled = true;
    document.getElementById("loader").style.display = "block";

    controller = new AbortController();

    let res = await fetch(`/search?surname=${encodeURIComponent(surname)}&firstname=${encodeURIComponent(firstname)}`, {
        signal: controller.signal
    });

    let data = await res.json();

    document.getElementById("searchBtn").disabled = false;
    document.getElementById("loader").style.display = "none";

    render(data.results);
}

function cancelSearch() {
    if (controller) controller.abort();
}

function render(data) {

    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    data.forEach(r => {
        let div = document.createElement("div");

        let name = r.name;

        div.innerHTML = `
            <div class="result">
                <b>${name}</b><br>
                Relative: ${r.relative_name || ""}<br>
                House: ${r.house_no} | Age: ${r.age}<br>
                File: ${r.source_file}
            </div>
        `;

        resultsDiv.appendChild(div);
    });
}

// ENTER key support
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") search();
});
</script>

</body>
</html>
