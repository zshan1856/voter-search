<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      margin: 0;
      background: #f7f7f7;
    }

    .header {
      position: sticky;
      top: 0;
      background: white;
      padding: 15px;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px;
      margin-top: 5px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
    }

    .search-btn { background: black; color: white; }
    .cancel-btn { background: red; color: white; }
    .filter-btn { background: #1976d2; color: white; }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .results {
      height: calc(100vh - 200px);
      overflow-y: auto;
      padding: 10px;
    }

    .result {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #eee;
    }

    .highlight {
      background: #ffe082;
    }

    #loader { display:none; }

    .filter-box {
      display:none;
      margin-top:10px;
      padding:10px;
      background:#fafafa;
      border-radius:8px;
      border:1px solid #ddd;
    }
  </style>
</head>

<body>

<div class="header container">

<h2>Kausa Mumbra 2002 Voter Search</h2>

<a href="https://drive.google.com/uc?export=download&id=1qwCIJ4ERVkUSm_k0-4hk-92eHRWSV5Tg" target="_blank">
  <button>Download Full Voter List (PDF)</button>
</a>

<input id="surname" placeholder="Surname">
<input id="firstname" placeholder="First Name">

<button class="search-btn" id="searchBtn" onclick="search()">Search</button>
<button class="cancel-btn" onclick="cancelSearch()">Cancel</button>
<button class="filter-btn" id="filterBtn" onclick="toggleFilter()" style="display:none;">Filters</button>

<p id="status"></p>
<p id="loader">🔍 Searching...</p>

<div class="filter-box" id="filterBox">
  <input id="houseFilter" placeholder="House No">
  <input id="ageFilter" placeholder="Age">
  <button onclick="applyFilter()">Apply</button>
  <button onclick="clearFilter()">Clear</button>
</div>

</div>

<div class="results container" id="results"></div>

<script>

let controller;
let originalResults = [];

// ✅ escape regex safely
function escapeRegex(text) {
    return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ✅ fixed highlight
function highlight(text, q) {
    if (!q) return text;

    try {
        let safe = escapeRegex(q.trim());
        let regex = new RegExp(safe, "gi");
        return text.replace(regex, match => `<span class="highlight">${match}</span>`);
    } catch {
        return text;
    }
}

async function search() {

    // RESET UI STATE
    document.getElementById("filterBox").style.display = "none";
    document.getElementById("filterBtn").style.display = "none";
    document.getElementById("houseFilter").value = "";
    document.getElementById("ageFilter").value = "";
    document.getElementById("status").innerText = "";

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    document.getElementById("searchBtn").disabled = true;
    document.getElementById("loader").style.display = "block";

    controller = new AbortController();

    try {
        let res = await fetch(`/search?surname=${encodeURIComponent(surname)}&firstname=${encodeURIComponent(firstname)}`, {
            signal: controller.signal
        });

        let data = await res.json();

        originalResults = data.results || [];

        // ✅ RESULT COUNT
        document.getElementById("status").innerText = `Found ${originalResults.length} results`;

        // ✅ SHOW FILTER ONLY IF RESULTS
        if (originalResults.length > 0) {
            document.getElementById("filterBtn").style.display = "inline-block";
        }

        render(originalResults);

    } catch (e) {
        console.log("Search cancelled or failed");
    }

    document.getElementById("searchBtn").disabled = false;
    document.getElementById("loader").style.display = "none";
}

function cancelSearch() {
    if (controller) controller.abort();
}

function render(data) {

    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    data.forEach(r => {

        let name = r.name || "";

        // ✅ APPLY BOTH HIGHLIGHTS
        name = highlight(name, surname);
        name = highlight(name, firstname);

        let div = document.createElement("div");

        div.innerHTML = `
            <div class="result">
                <b>${name}</b><br>
                Relative: ${r.relative_name || ""}<br>
                House: ${r.house_no} | Age: ${r.age}<br>
                File: ${r.source_file}
            </div>
        `;

        resultsDiv.appendChild(div);
    });
}

function toggleFilter() {

    // ❗ only allow if results exist
    if (originalResults.length === 0) return;

    let box = document.getElementById("filterBox");

    box.style.display = box.style.display === "none" ? "block" : "none";
}

function applyFilter() {

    let house = document.getElementById("houseFilter").value.trim();
    let age = document.getElementById("ageFilter").value.trim();

    let filtered = originalResults;

    if (house) filtered = filtered.filter(r => r.house_no == house);
    if (age) filtered = filtered.filter(r => r.age == age);

    // ✅ UPDATE COUNT
    document.getElementById("status").innerText = `Filtered: ${filtered.length} results`;

    render(filtered);
}

function clearFilter() {
    document.getElementById("houseFilter").value = "";
    document.getElementById("ageFilter").value = "";

    document.getElementById("status").innerText = `Found ${originalResults.length} results`;

    render(originalResults);
}

// ENTER support
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") search();
});
</script>

</body>
</html>
