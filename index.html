<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #fafafa;
    }

    h2 {
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    .result {
      background: white;
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    .name { font-weight: bold; }

    .h-name { background: #ffe082; }
    .h-house { background: #80deea; }
    .h-age { background: #c5e1a5; }

    #status {
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>

<body>

<h2>Kausa Mumbra 2002 Voter Search</h2>

<a href="https://drive.google.com/uc?export=download&id=1qwCIJ4ERVkUSm_k0-4hk-92eHRWSV5Tg" target="_blank">
  <button>Download Full Voter List (PDF)</button>
</a>

<br><br>

<input id="surname" placeholder="Surname (Shaikh / शेख)">
<input id="firstname" placeholder="First Name (Dawood / दाऊद)">
<input id="house" placeholder="House No">
<input id="age" placeholder="Age">

<button onclick="search()">Search</button>

<p id="status"></p>
<div id="results"></div>

<script>

function highlight(text, query, cls) {
    if (!query) return text;

    let regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, `<span class="${cls}">$1</span>`);
}

async function search() {

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();
    let house = document.getElementById("house").value.trim();
    let age = document.getElementById("age").value.trim();

    let status = document.getElementById("status");
    let resultsDiv = document.getElementById("results");

    status.innerText = "Searching...";
    resultsDiv.innerHTML = "";

    let url = `/search?surname=${surname}&firstname=${firstname}&house_no=${house}&age=${age}`;

    let res = await fetch(url);
    let data = await res.json();

    status.innerText = `Found ${data.results.length} results`;

    if (data.results.length === 0) {
        resultsDiv.innerHTML = "No results found";
        return;
    }

    data.results.forEach(r => {

        let div = document.createElement("div");
        div.className = "result";

        let name = r.name;
        let houseText = r.house_no;
        let ageText = r.age || "N/A";

        // Highlight separately
        if (surname) name = highlight(name, surname, "h-name");
        if (firstname) name = highlight(name, firstname, "h-name");

        if (house) houseText = highlight(houseText, house, "h-house");
        if (age) ageText = highlight(ageText, age, "h-age");

        div.innerHTML = `
            <div class="name">${name}</div>
            House: ${houseText} | Age: ${ageText}<br>
            File: ${r.source_file}
        `;

        resultsDiv.appendChild(div);
    });
}

</script>

</body>
</html>
