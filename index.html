<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      position: sticky;
      top: 0;
      background: white;
      padding: 15px;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    input {
      width: 48%;
      padding: 10px;
      margin: 5px 1%;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .btn {
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .search-btn { background: black; color: white; }
    .filter-btn { background: #1976d2; color: white; }

    .results {
      padding: 15px;
      height: calc(100vh - 140px);
      overflow-y: auto;
    }

    .card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .highlight {
      background: #ffe082;
    }

    .filter-box {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">

  <h3>Kausa Mumbra 2002 Voter</h3>

  <input id="surname" placeholder="Surname">
  <input id="firstname" placeholder="First Name">

  <button class="btn search-btn" onclick="search()">Search</button>
  <button class="btn filter-btn" onclick="toggleFilter()">Filters</button>

  <div class="filter-box" id="filterBox">
    <input id="house" placeholder="House No">
    <input id="age" placeholder="Age">
    <button onclick="applyFilter()">Apply</button>
    <button onclick="clearFilter()">Clear</button>
  </div>

</div>

<div class="results" id="results"></div>

<script>

let original = [];

function highlight(text, q) {
    if (!q) return text;
    return text.replace(new RegExp(q, "gi"), m => `<span class="highlight">${m}</span>`);
}

async function search() {

    let surname = document.getElementById("surname").value;
    let firstname = document.getElementById("firstname").value;

    let res = await fetch(`/search?surname=${surname}&firstname=${firstname}`);
    let data = await res.json();

    original = data.results;

    render(original);
}

function render(data) {

    let div = document.getElementById("results");
    div.innerHTML = "";

    data.forEach(r => {

        let name = r.name;
        name = highlight(name, document.getElementById("surname").value);
        name = highlight(name, document.getElementById("firstname").value);

        div.innerHTML += `
        <div class="card">
          <b>${name}</b><br>
          Relative: ${r.relative_name || ""}<br>
          House: ${r.house_no} | Age: ${r.age}<br>
          File: ${r.source_file}
        </div>`;
    });
}

function toggleFilter() {
    let box = document.getElementById("filterBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function applyFilter() {
    let house = document.getElementById("house").value;
    let age = document.getElementById("age").value;

    let filtered = original;

    if (house) filtered = filtered.filter(r => r.house_no == house);
    if (age) filtered = filtered.filter(r => r.age == age);

    render(filtered);
}

function clearFilter() {
    document.getElementById("house").value = "";
    document.getElementById("age").value = "";
    render(original);
}

</script>

</body>
</html>
