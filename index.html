<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>
</head>
<body>

<h2>Search Voter</h2>

<input type="text" id="surname" placeholder="Surname"><br><br>
<input type="text" id="firstname" placeholder="First Name"><br><br>
<input type="text" id="house" placeholder="House No"><br><br>
<input type="text" id="age" placeholder="Age"><br><br>

<button onclick="search()">Search</button>

<ul id="results"></ul>

<script>
async function search() {
    let surname = document.getElementById("surname").value;
    let firstname = document.getElementById("firstname").value;
    let house = document.getElementById("house").value;
    let age = document.getElementById("age").value;

    let url = `/search?surname=${surname}&firstname=${firstname}&house_no=${house}&age=${age}`;

    let res = await fetch(url);
    let data = await res.json();

    let list = document.getElementById("results");
    list.innerHTML = "";

    data.results.forEach(r => {
        let li = document.createElement("li");
        li.innerText = `${r.name} | House: ${r.house_no} | Age: ${r.age} | File: ${r.source_file}`;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
