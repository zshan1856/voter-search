<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      margin: 0;
      background: #f7f7f7;
    }

    .header {
      position: sticky;
      top: 0;
      background: white;
      padding: 12px;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 0 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      padding: 12px;
      margin-top: 6px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-btn { background: black; color: white; flex: 1; }
    .cancel-btn { background: red; color: white; flex: 1; }
    .filter-btn { background: #1976d2; color: white; width: 100%; }

    .results {
      height: calc(100vh - 220px);
      overflow-y: auto;
      padding: 10px;
    }

    .result {
      background: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #eee;
      line-height: 1.5;
    }

    .highlight {
      background: #ffe082;
    }

    #loader {
      display:none;
      font-size: 14px;
      color: #555;
    }

    .filter-box {
      display:none;
      margin-top:10px;
      padding:10px;
      background:#fafafa;
      border-radius:10px;
      border:1px solid #ddd;
    }

    /* 🔥 FOOTNOTE TAG */
    .footer-tag {
      position: fixed;
      bottom: 8px;
      left: 10px;
      font-size: 10px;
      font-style: italic;
      color: #5a0f0f; /* dark maroon */
      opacity: 0.6;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .footer-hidden {
      opacity: 0;
    }

    /* 📱 Mobile */
    @media (max-width: 600px) {
      .results {
        height: calc(100vh - 260px);
      }

      h2 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<div class="header">
<div class="container">

<h2>Kausa Mumbra 2002 Voter Search</h2>

<a href="https://drive.google.com/uc?export=download&id=1qwCIJ4ERVkUSm_k0-4hk-92eHRWSV5Tg" target="_blank">
  <button style="width:100%">Download Full Voter List (PDF)</button>
</a>

<input id="surname" placeholder="Surname">
<input id="firstname" placeholder="First Name">

<div class="btn-row">
  <button class="search-btn" id="searchBtn" onclick="search()">Search</button>
  <button class="cancel-btn" onclick="cancelSearch()">Cancel</button>
</div>

<button class="filter-btn" id="filterBtn" onclick="toggleFilter()" style="display:none;">
  Filters
</button>

<p id="status"></p>
<p id="loader">🔍 Searching...</p>

<div class="filter-box" id="filterBox">
  <input id="houseFilter" placeholder="House No">
  <input id="ageFilter" placeholder="Age">
  <div class="btn-row">
    <button onclick="applyFilter()">Apply</button>
    <button onclick="clearFilter()">Clear</button>
  </div>
</div>

</div>
</div>

<div class="results container" id="results"></div>

<!-- 🔥 FOOTNOTE -->
<div class="footer-tag" id="footerTag">
  Developed by Zeeshan Hasan
</div>

<script>

let controller;
let originalResults = [];
let scrollTimeout;

// highlight helpers
function escapeRegex(text) {
    return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, q) {
    if (!q) return text;
    try {
        let regex = new RegExp(escapeRegex(q), "gi");
        return text.replace(regex, m => `<span class="highlight">${m}</span>`);
    } catch {
        return text;
    }
}

async function search() {

    document.getElementById("filterBox").style.display = "none";
    document.getElementById("filterBtn").style.display = "none";
    document.getElementById("houseFilter").value = "";
    document.getElementById("ageFilter").value = "";
    document.getElementById("status").innerText = "";

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    document.getElementById("searchBtn").disabled = true;
    document.getElementById("loader").style.display = "block";

    controller = new AbortController();

    try {
        let res = await fetch(`/search?surname=${encodeURIComponent(surname)}&firstname=${encodeURIComponent(firstname)}`, {
            signal: controller.signal
        });

        let data = await res.json();

        originalResults = data.results || [];

        document.getElementById("status").innerText = `Found ${originalResults.length} results`;

        if (originalResults.length > 0) {
            document.getElementById("filterBtn").style.display = "block";
        }

        render(originalResults);

    } catch (e) {
        console.log("Search cancelled");
    }

    document.getElementById("searchBtn").disabled = false;
    document.getElementById("loader").style.display = "none";
}

function cancelSearch() {
    if (controller) controller.abort();
}

function render(data) {

    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    data.forEach(r => {

        let name = r.name || "";

        name = highlight(name, surname);
        name = highlight(name, firstname);

        let file = r.source_file || "";
        let page = file.replace(".jpg", "");

        let div = document.createElement("div");

        div.innerHTML = `
            <div class="result">
                <b>${name}</b><br>
                Relative: ${r.relative_name || ""}<br>
                House: ${r.house_no} | Age: ${r.age}<br>
                File: ${file} | Page: ${page}
            </div>
        `;

        resultsDiv.appendChild(div);
    });
}

function toggleFilter() {
    if (originalResults.length === 0) return;
    let box = document.getElementById("filterBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function applyFilter() {

    let house = document.getElementById("houseFilter").value.trim();
    let age = document.getElementById("ageFilter").value.trim();

    let filtered = originalResults;

    if (house) filtered = filtered.filter(r => r.house_no == house);
    if (age) filtered = filtered.filter(r => r.age == age);

    document.getElementById("status").innerText = `Filtered: ${filtered.length} results`;

    render(filtered);
}

function clearFilter() {
    document.getElementById("houseFilter").value = "";
    document.getElementById("ageFilter").value = "";
    document.getElementById("status").innerText = `Found ${originalResults.length} results`;
    render(originalResults);
}

// ENTER support
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") search();
});

// 🔥 Hide footer on scroll
window.addEventListener("scroll", function() {
    let tag = document.getElementById("footerTag");
    tag.classList.add("footer-hidden");

    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
        tag.classList.remove("footer-hidden");
    }, 800);
});
</script>

</body>
</html>
