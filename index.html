<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #fafafa;
    }

    h2 {
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .result {
      background: white;
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    #status {
      margin-top: 10px;
      color: gray;
    }

    .filter-box {
      display: none;
      background: #fff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .filter-btn {
      margin-top: 10px;
      background: #555;
    }
  </style>
</head>

<body>

<h2>Kausa Mumbra 2002 Voter Search</h2>

<a href="https://drive.google.com/uc?export=download&id=1qwCIJ4ERVkUSm_k0-4hk-92eHRWSV5Tg" target="_blank">
  <button>Download Full Voter List (PDF)</button>
</a>

<br><br>

<!-- SEARCH INPUT -->
<input id="surname" placeholder="Surname (Shaikh / शेख)">
<input id="firstname" placeholder="First Name (Dawood / दाऊद)">

<button onclick="search()">Search</button>

<p id="status"></p>

<!-- FILTER BUTTON -->
<button class="filter-btn" onclick="toggleFilter()" id="filterBtn" style="display:none;">
  ⚙️ Filters
</button>

<!-- FILTER PANEL -->
<div class="filter-box" id="filterBox">
  <input id="houseFilter" placeholder="House No">
  <input id="ageFilter" placeholder="Age">
  <button onclick="applyFilter()">Apply Filter</button>
</div>

<!-- RESULTS -->
<div id="results"></div>

<script>

let originalResults = []; // store search results

function toggleFilter() {
    let box = document.getElementById("filterBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

// -------------------------
// SEARCH
// -------------------------
async function search() {

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    let status = document.getElementById("status");
    let resultsDiv = document.getElementById("results");

    status.innerText = "Searching...";
    resultsDiv.innerHTML = "";

    let url = `/search?surname=${encodeURIComponent(surname)}&firstname=${encodeURIComponent(firstname)}`;

    try {
        let res = await fetch(url);
        let data = await res.json();

        originalResults = data.results || [];

        // show filter button only after results
        document.getElementById("filterBtn").style.display = "block";

        renderResults(originalResults);

    } catch (err) {
        console.error(err);
        status.innerText = "Error fetching results";
    }
}

// -------------------------
// RENDER RESULTS
// -------------------------
function renderResults(data) {

    let status = document.getElementById("status");
    let resultsDiv = document.getElementById("results");

    status.innerText = `Found ${data.length} results`;

    if (data.length === 0) {
        resultsDiv.innerHTML = "No results found";
        return;
    }

    resultsDiv.innerHTML = "";

    data.forEach(r => {

        let div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <b>${r.name}</b><br>
            Relative: ${r.relative_name || "N/A"}<br>
            House: ${r.house_no} | Age: ${r.age || "N/A"}<br>
            File: ${r.source_file}
        `;

        resultsDiv.appendChild(div);
    });
}

// -------------------------
// APPLY FILTER (CLIENT SIDE)
// -------------------------
function applyFilter() {

    let house = document.getElementById("houseFilter").value.trim();
    let age = document.getElementById("ageFilter").value.trim();

    let filtered = originalResults;

    if (house) {
        filtered = filtered.filter(r => r.house_no === house);
    }

    if (age) {
        filtered = filtered.filter(r => String(r.age) === age);
    }

    renderResults(filtered);
}

</script>

</body>
</html>
